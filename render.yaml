services:
  - type: web
    name: servicio-auth
    env: docker
    dockerfilePath: ./microservicios/servicio-auth/Dockerfile
    dockerContext: ./microservicios/servicio-auth
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: escuela5estrellas-db
          property: connectionString

  - type: web
    name: servicio-estudiantes
    env: docker
    dockerfilePath: ./microservicios/servicio-estudiantes/Dockerfile
    dockerContext: ./microservicios/servicio-estudiantes
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: escuela5estrellas-db
          property: connectionString

  - type: web
    name: frontend-escuela5estrellas
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    plan: free
    autoDeploy: true
    envVars:
      - key: VITE_AUTH_API_URL
        fromService:
          type: web
          name: servicio-auth
          property: host

databases:
  - name: escuela5estrellas-db
    databaseName: escuela5estrellas
    plan: free
