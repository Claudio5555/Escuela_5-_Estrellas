services:
  - type: web
    name: servicio-auth
    env: docker
    dockerfilePath: ./microservicios/servicio-auth/Dockerfile
    dockerContext: ./microservicios/servicio-auth
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: escuela5estrellas-db
          property: connectionString

  - type: web
    name: servicio-estudiantes
    env: docker
    dockerfilePath: ./microservicios/servicio-estudiantes/Dockerfile
    dockerContext: ./microservicios/servicio-estudiantes
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: escuela5estrellas-db
          property: connectionString

databases:
  - name: escuela5estrellas-db
    databaseName: escuela5estrellas
    plan: free
